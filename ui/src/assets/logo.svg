        stroke-linecap="round"/>
  <path d="M 50 15 Q 50 3 55 8" 
        fill="none" 
        stroke="#4CAF50" 
        stroke-width="3" 
        stroke-linecap="round"/>
  <path d="M 50 15 Q 55 5 60 10" 
